[phases.setup]
nixPkgs = ["nodejs_22", "python311", "python311Packages.pip"]

[phases.install]
cmds = [
  "npm install",
  "python3 -m pip install -r requirements.txt --break-system-packages",
  "python3 -m playwright install --with-deps chromium"
]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"